name: nightly-sync

on:
  schedule:
    # 02:00 UTC daily — matches the Vercel cron canary in apps/civitics/vercel.json
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-sync
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://xsazcoxinpgttgquwvuf.supabase.co
      SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_DB_PASSWORD:     ${{ secrets.SUPABASE_DB_PASSWORD }}
      CONGRESS_API_KEY:         ${{ secrets.CONGRESS_API_KEY }}
      OPENSTATES_API_KEY:       ${{ secrets.OPENSTATES_API_KEY }}
      COURTLISTENER_API_KEY:    ${{ secrets.COURTLISTENER_API_KEY }}
      REGULATIONS_API_KEY:      ${{ secrets.REGULATIONS_API_KEY }}
      CIVITICS_ANTHROPIC_API_KEY: ${{ secrets.CIVITICS_ANTHROPIC_API_KEY }}
      AUTONOMOUS:               "true"
      CIVITICS_ENRICHMENT_MODE: queue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run nightly sync
        run: pnpm --filter @civitics/data data:nightly:ci
